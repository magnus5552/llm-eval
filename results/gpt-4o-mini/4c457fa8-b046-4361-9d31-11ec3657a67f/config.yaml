protocol: novel-tunnel-v1
version: 1
transport:
  type: tls
  host: 127.0.0.1
  port: 9443
  tls:
    version: '1.3'
    fingerprint: chrome-120
    alpn:
    - h2
    - http/1.1
    sni: www.google.com
    cert_file: server.crt
    key_file: server.key
    insecure: true
handshake:
  type: tls-token
  tls_token:
    field: session_ticket
    kdf: hkdf-sha256
    psk: ''
    length: 48
crypto:
  aead: chacha20-poly1305
  kdf: hkdf-sha256
padding:
  mode: mimicry
  profile: chrome-browsing
timing:
  mode: none
fallback:
  enabled: true
  mode: reverse-proxy
  target: https://www.google.com
