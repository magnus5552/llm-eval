protocol: tls-noise-v2
version: 1
transport:
  type: tls
  host: 127.0.0.1
  port: 443
  tls:
    version: '1.3'
    fingerprint: chrome-120
    alpn:
    - h2
    - http/1.1
    sni: www.cloudflare.com
    cert_file: server.crt
    key_file: server.key
    insecure: true
handshake:
  type: noise
  noise:
    pattern: NNpsk2
    cipher_suite: 25519:ChaChaPoly:BLAKE2s
    local_key: generate
crypto:
  aead: chacha20-poly1305
  kdf: hkdf-sha256
padding:
  mode: random
  random_min: 40
  random_max: 1400
timing:
  mode: none
fallback:
  enabled: true
  mode: reverse-proxy
  target: https://www.cloudflare.com
